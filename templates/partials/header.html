<header class="site-header">
  <div class="container nav-shell">
    <a class="brand" href="{{ url_for('index') }}" aria-label="Till startsidan">
      <img class="brand-logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="{{ company_name }} logotyp">
    </a>

    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Meny</button>

    <nav id="site-nav" class="site-nav" aria-label="Huvudnavigation">
      <a class="{% if request_path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">Hem</a>
      <a class="{% if request_path == url_for('about') %}active{% endif %}" href="{{ url_for('about') }}">Om oss</a>
      <a class="{% if request_path.startswith('/tjanster') %}active{% endif %}" href="{{ url_for('services_page') }}">Tjänster</a>
      <a class="{% if request_path == url_for('references_page') %}active{% endif %}" href="{{ url_for('references_page') }}">Referenser</a>
      <a class="{% if request_path == url_for('reviews_page') %}active{% endif %}" href="{{ url_for('reviews_page') }}">Recensioner</a>
      <a class="{% if request_path == url_for('faq') %}active{% endif %}" href="{{ url_for('faq') }}">Vanliga frågor</a>
      <a class="{% if request_path == url_for('contact') %}active{% endif %}" href="{{ url_for('contact') }}">Kontakt</a>
      <a class="button button-small" href="{{ url_for('quote') }}">Begär offert</a>
    </nav>
  </div>
</header>
